# Hermes TR_AR Configuration
# يُنسخ هذا الملف إلى $HERMES_HOME/config.yaml عند تشغيل الحاوية.
# للتخصيص: استخدم متغيرات البيئة أو عدّل هذا الملف مباشرة.

# =============================================================================
# Model Configuration
# =============================================================================
model:
  # النموذج الافتراضي — يمكن تجاوزه بـ --model أو HERMES_MODEL
  default: "google/gemini-2.0-flash-001"

  # مزود الاستدلال — openrouter لـ TR_AR
  provider: "openrouter"

  # api_key يُقرأ من OPENROUTER_API_KEY في البيئة
  base_url: "https://openrouter.ai/api/v1"

# =============================================================================
# Terminal Tool Configuration
# =============================================================================
terminal:
  backend: "local"
  cwd: "."
  timeout: 180
  lifetime_seconds: 300
  docker_mount_cwd_to_workspace: false

# =============================================================================
# Context Compression
# =============================================================================
compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20
  summary_model: "google/gemini-2.0-flash-001"

# =============================================================================
# Browser Tool
# =============================================================================
browser:
  inactivity_timeout: 120
