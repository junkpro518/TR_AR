services:
  tr-ar:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: https://tr-ar.junkpro.duckdns.org

    image: tr-ar:latest
    container_name: tr-ar
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - NODE_ENV=production
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NEXT_PUBLIC_APP_URL=https://tr-ar.junkpro.duckdns.org
      - HERMES_API_URL=http://hermes:8000

    networks:
      - proxy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tr-ar.rule=Host(`tr-ar.junkpro.duckdns.org`)"
      - "traefik.http.routers.tr-ar.entrypoints=websecure"
      - "traefik.http.routers.tr-ar.tls.certresolver=myresolver"
      - "traefik.http.services.tr-ar.loadbalancer.server.port=3000"

    logging:
      options:
        max-size: "10m"
        max-file: "3"

  hermes:
    build:
      context: .
      dockerfile: hermes/Dockerfile
    image: tr-ar-hermes:latest
    container_name: tr-ar-hermes
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - CHAT_MODEL=${CHAT_MODEL:-google/gemini-2.0-flash-001}
      - HERMES_MAX_TURNS=8

    volumes:
      # يحفظ ذاكرة Hermes (محادثات + USER.md + SQLite) عبر إعادة تشغيل الحاوية
      - hermes_memory:/root/.hermes

    networks:
      - proxy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

    logging:
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy:
    external: true

volumes:
  hermes_memory:
