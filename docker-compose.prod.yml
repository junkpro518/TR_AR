services:
  tr-ar:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: https://tr-ar.junkpro.duckdns.org

    image: tr-ar:latest
    container_name: tr-ar
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - NODE_ENV=production
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NEXT_PUBLIC_APP_URL=https://tr-ar.junkpro.duckdns.org

    networks:
      - proxy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tr-ar.rule=Host(`tr-ar.junkpro.duckdns.org`)"
      - "traefik.http.routers.tr-ar.entrypoints=websecure"
      - "traefik.http.routers.tr-ar.tls.certresolver=myresolver"
      - "traefik.http.services.tr-ar.loadbalancer.server.port=3000"

    logging:
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy:
    external: true
